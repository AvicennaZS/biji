<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYMUS</title>
    <style>
      /* Background page */
      body {
        background-image: url(bg.png);
        background-size: cover;
        margin: 0; /* Ensure no default margin */
        font-family: Arial, sans-serif; /* Set a default font for the body */
      }

      /* Navbar link color */
      .navbar-light .navbar-nav .nav-link {
        color: #000;
      }

      /* Navbar background color */
      .bg-dark-blue-transparent {
        background-color: rgba(14, 30, 47, 0.8);
      }

      /* Brand positioning */
      .navbar-brand {
        display: flex;
        align-items: center;
      }

      /* Space between logo and brand name */
      #MUS-LOGO {
        margin-right: 10px;
      }

      /* Brand name text style */
      .brand-text {
        font-size: 24px;
        font-weight: bold;
        color: #a2a502;
      }

      /* Card styles */
      .card-body {
        padding: 24px; /* Add padding for card content */
      }
    </style>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!--https://getbootstrap.com/docs/5.3/components/navbar/-->
    <nav
      class="navbar navbar-expand-lg fixed-top bg-dark-blue-transparent navbar-dark"
    >
      <div class="container">
        <a class="navbar-brand" href="#">
          <img
            id="MUS-LOGO"
            src="logo.png"
            alt="MYMUS Logo"
            height="50"
            draggable="false"
          />
          <span class="brand-text">MYMUS</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link mx-2" href="#!"
                ><i class="fas fa-plus-circle pe-2"></i>List Song</a
              >
            </li>
            <li class="nav-item">
              <form class="d-flex">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Search"
                  aria-label="Search"
                />
                <button class="btn btn-outline-success" type="submit">
                  Search
                </button>
              </form>
            </li>
            <li class="nav-item ms-3">
              <a class="btn btn-light btn-rounded" href="#!">Sign in</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!--sumber template main-->
    <main>
      <div class="container" style="margin-top: 80px">
        <!-- Adjust for fixed navbar -->
        <div class="row">
          <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
              <a href="#" style="text-decoration: none">
                <img
                  src="naruto.png"
                  class="card-img-top"
                  alt="Naruto Thumbnail"
                  style="height: 200px; object-fit: cover"
                />
                <div class="card-body">
                  <p class="card-text">Batch Opening Naruto.</p>
                </div>
              </a>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
              <img
                src="onepiece.png"
                class="card-img-top"
                alt="One Piece Thumbnail"
                style="height: 200px; object-fit: cover"
              />
              <div class="card-body">
                <p class="card-text">Batch Opening One Piece.</p>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
              <img
                src="naruto s.png"
                class="card-img-top"
                alt="Naruto Shippuden Thumbnail"
                style="height: 200px; object-fit: cover"
              />
              <div class="card-body">
                <p class="card-text">Batch Opening Naruto Shippuden</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!--https://mdbootstrap.com/docs/standard/navigation/footer/-->
    <footer class="bg-dark-blue-transparent text-center">
      <!-- Grid container -->
      <div class="container p-4 pb-0">
        <!-- Section: Social media -->
        <section class="mb-4">
          <!-- Facebook -->
          <a
            data-mdb-ripple-init
            class="btn text-white btn-floating m-1"
            style="background-color: #3b5998"
            href="#!"
            role="button"
            ><i class="fab fa-facebook-f"></i
          ></a>

          <!-- Twitter -->
          <a
            data-mdb-ripple-init
            class="btn text-white btn-floating m-1"
            style="background-color: #55acee"
            href="#!"
            role="button"
            ><i class="fab fa-twitter"></i
          ></a>

          <!-- Google -->
          <a
            data-mdb-ripple-init
            class="btn text-white btn-floating m-1"
            style="background-color: #dd4b39"
            href="#!"
            role="button"
            ><i class="fab fa-google"></i
          ></a>

          <!-- Instagram -->
          <a
            data-mdb-ripple-init
            class="btn text-white btn-floating m-1"
            style="background-color: #ac2bac"
            href="#!"
            role="button"
            ><i class="fab fa-instagram"></i
          ></a>

          <!-- Linkedin -->
          <a
            data-mdb-ripple-init
            class="btn text-white btn-floating m-1"
            style="background-color: #0082ca"
            href="#!"
            role="button"
            ><i class="fab fa-linkedin-in"></i
          ></a>
          <!-- Github -->
          <a
            data-mdb-ripple-init
            class="btn text-white btn-floating m-1"
            style="background-color: #333333"
            href="#!"
            role="button"
            ><i class="fab fa-github"></i
          ></a>
        </section>
        <!-- Section: Social media -->
      </div>
      <!-- Grid container -->

      <!-- Copyright -->
      <div
        class="text-center p-3"
        style="background-color: rgba(0, 0, 0, 0.05); color: white"
      >
        © 2024 Copyright:
        <a href="https://mdbootstrap.com/" style="color: white">MYMUS</a>
      </div>
      <!-- Copyright -->
    </footer>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
